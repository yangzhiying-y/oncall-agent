# Super Biz Agent 完整服务编排
# 包含：主应用 + Milvus 向量库 + MCP 服务器
#
# 启动: docker compose up -d
# 停止: docker compose down
# 日志: docker compose logs -f app

services:
  # ========================================
  # Milvus 向量数据库基础设施
  # ========================================
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.18
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/etcd:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.5.10
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/milvus:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy

  attu:
    container_name: milvus-attu
    image: zilliz/attu:v2.5
    ports:
      - "8000:3000"
    environment:
      MILVUS_URL: milvus:19530
    depends_on:
      - milvus

  # ========================================
  # MCP 服务器
  # ========================================
  mcp-cls:
    container_name: mcp-cls
    build: .
    command: python mcp_servers/cls_server.py
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
    volumes:
      - ./logs:/app/logs:ro  # 只读挂载日志目录
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/mcp/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  mcp-monitor:
    container_name: mcp-monitor
    build: .
    command: python mcp_servers/monitor_server.py
    pid: "host"  # 允许读取宿主机进程信息
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/mcp/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ========================================
  # 主应用 (FastAPI)
  # ========================================
  app:
    container_name: super-biz-agent
    build: .
    ports:
      - "9900:9900"
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - DASHSCOPE_API_BASE=${DASHSCOPE_API_BASE:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - DASHSCOPE_MODEL=${DASHSCOPE_MODEL:-qwen-max}
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - MCP_CLS_URL=http://mcp-cls:8003/mcp
      - MCP_MONITOR_URL=http://mcp-monitor:8004/mcp
      - DEBUG=${DEBUG:-false}
    volumes:
      - ./data:/app/data          # SQLite 检查点持久化
      - ./logs:/app/logs           # 应用日志
      - ./uploads:/app/uploads     # 上传文件
      - ./aiops-docs:/app/aiops-docs:ro  # 知识库文档（只读）
    depends_on:
      milvus:
        condition: service_healthy
      mcp-cls:
        condition: service_healthy
      mcp-monitor:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9900/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    restart: unless-stopped

networks:
  default:
    name: super-biz-agent-net
